spring:
  datasource:
    url: jdbc:postgresql://analytics-db:5432/analytics_db
    driver-class-name: org.postgresql.Driver
    username: analytics
    password: analytics
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8087

services:
  checkin:
    url: http://attendee-checkin-service:8086
